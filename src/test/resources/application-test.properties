# Banco H2 em memória (modo PostgreSQL) — sem necessidade de Docker no CI
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Flyway roda as migrations reais sobre o H2
spring.flyway.enabled=true

# Desabilita o Docker Compose (não precisamos de postgres no CI)
spring.docker.compose.enabled=false

# URL base usada pelo UrlService para gerar os links encurtados
app.base-url=http://localhost:8080/
